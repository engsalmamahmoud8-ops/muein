[build]
  command = "npm install --include=optional && npm run build && mkdir -p .netlify/functions-internal && cp -r dist/server .netlify/functions-internal/server"
  publish = "dist/client"

[build.environment]
  NITRO_PRESET = "netlify"
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=optional"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true